<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1e1b4b"/>

  <!-- Truck body -->
  <rect x="8" y="26" width="30" height="20" rx="3" fill="#6366f1"/>
  <!-- Truck cab -->
  <rect x="38" y="32" width="18" height="14" rx="3" fill="#4f46e5"/>
  <!-- Cab window -->
  <rect x="40" y="34" width="10" height="7" rx="2" fill="#a5b4fc"/>

  <!-- Front bumper -->
  <rect x="54" y="40" width="3" height="5" rx="1" fill="#3730a3"/>

  <!-- Truck connector between body and cab -->
  <rect x="36" y="34" width="4" height="8" fill="#4f46e5"/>

  <!-- Wheels -->
  <circle cx="16" cy="47" r="5" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <circle cx="16" cy="47" r="2" fill="#6366f1"/>
  <circle cx="30" cy="47" r="5" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <circle cx="30" cy="47" r="2" fill="#6366f1"/>
  <circle cx="50" cy="47" r="5" fill="#1e1b4b" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="50" cy="47" r="2" fill="#f59e0b"/>

  <!-- Cargo lines on body -->
  <line x1="16" y1="30" x2="16" y2="44" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="24" y1="30" x2="24" y2="44" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ArwaPark "A" accent dot -->
  <circle cx="50" cy="20" r="6" fill="#f59e0b"/>
  <path d="M47 24 L50 16 L53 24 M48.2 22 H51.8" stroke="#1e1b4b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
