# Nixpacks configuration for ArwaPark monorepo
# Single exposed port: 3000 (Next.js)
# Next.js rewrites /api/v1/* → backend on localhost:5000

[phases.install]
cmds = [
  "npm install",
  "cd backend && npm ci --only=production",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && NEXT_TELEMETRY_DISABLED=1 NODE_ENV=production NEXT_PUBLIC_API_URL=/api/v1 npm run build"
]

[start]
# Start backend first (port 5000, internal only), then frontend (port 3000, exposed)
cmd = "npm start"
