version: '3.8'

services:
  arwapark:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: arwapark
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - CLIENT_URL=${CLIENT_URL:-https://arwapark.digima.cloud}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.arwapark.digima.cloud/api/v1}
      - NEXT_PUBLIC_DOMAIN=${NEXT_PUBLIC_DOMAIN:-arwapark.digima.cloud}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
